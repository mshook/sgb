<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Georgia, serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="480" fill="#faf8f5" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c2c2c">Biconnected Components</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#777">Remove any single vertex within a block, and the block stays connected.</text>

  <!-- Block 1 background (left triangle) -->
  <path d="M 80,140 Q 80,100 130,100 L 230,100 Q 280,100 280,140 L 280,250 Q 280,290 230,290 L 130,290 Q 80,290 80,250 Z" fill="#dceefb" stroke="#8bbde0" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.6"/>
  <text x="180" y="310" text-anchor="middle" font-size="12" fill="#3a7abf" font-style="italic">Block 1</text>

  <!-- Block 1 edges -->
  <line x1="130" y1="150" x2="230" y2="150" stroke="#5a8ad8" stroke-width="2.5"/>
  <line x1="130" y1="150" x2="130" y2="250" stroke="#5a8ad8" stroke-width="2.5"/>
  <line x1="230" y1="150" x2="230" y2="250" stroke="#5a8ad8" stroke-width="2.5"/>
  <line x1="130" y1="250" x2="230" y2="250" stroke="#5a8ad8" stroke-width="2.5"/>
  <line x1="130" y1="150" x2="230" y2="250" stroke="#5a8ad8" stroke-width="2.5"/>

  <!-- Block 1 vertices -->
  <circle cx="130" cy="150" r="16" fill="#4a85d6" filter="url(#shadow)"/>
  <text x="130" y="155" text-anchor="middle" font-size="13" fill="white" font-weight="bold">A</text>
  <circle cx="230" cy="150" r="16" fill="#4a85d6" filter="url(#shadow)"/>
  <text x="230" y="155" text-anchor="middle" font-size="13" fill="white" font-weight="bold">B</text>
  <circle cx="130" cy="250" r="16" fill="#4a85d6" filter="url(#shadow)"/>
  <text x="130" y="255" text-anchor="middle" font-size="13" fill="white" font-weight="bold">C</text>

  <!-- Articulation point D (shared between blocks 1 and 2) -->
  <!-- Draw D with special styling -->
  <circle cx="230" cy="250" r="20" fill="none" stroke="#e53935" stroke-width="2.5" stroke-dasharray="4 2" filter="url(#glow)"/>
  <circle cx="230" cy="250" r="16" fill="#e53935" filter="url(#shadow)"/>
  <text x="230" y="255" text-anchor="middle" font-size="13" fill="white" font-weight="bold">D</text>

  <!-- Bridge edge from D to E -->
  <line x1="246" y1="250" x2="364" y2="250" stroke="#999" stroke-width="2.5" stroke-dasharray="8 4"/>

  <!-- Block 2 background -->
  <path d="M 350,140 Q 350,100 400,100 L 500,100 Q 540,100 540,140 L 540,300 Q 540,340 500,340 L 400,340 Q 350,340 350,300 Z" fill="#fce4ec" stroke="#f0a0b0" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.6"/>
  <text x="445" y="360" text-anchor="middle" font-size="12" fill="#c62828" font-style="italic">Block 2</text>

  <!-- Block 2 edges -->
  <line x1="380" y1="250" x2="440" y2="160" stroke="#e57373" stroke-width="2.5"/>
  <line x1="380" y1="250" x2="510" y2="250" stroke="#e57373" stroke-width="2.5"/>
  <line x1="440" y1="160" x2="510" y2="250" stroke="#e57373" stroke-width="2.5"/>
  <line x1="380" y1="250" x2="440" y2="310" stroke="#e57373" stroke-width="2.5"/>
  <line x1="510" y1="250" x2="440" y2="310" stroke="#e57373" stroke-width="2.5"/>

  <!-- Articulation point E (shared between blocks 2 and bridge) -->
  <circle cx="380" cy="250" r="20" fill="none" stroke="#e53935" stroke-width="2.5" stroke-dasharray="4 2" filter="url(#glow)"/>
  <circle cx="380" cy="250" r="16" fill="#e53935" filter="url(#shadow)"/>
  <text x="380" y="255" text-anchor="middle" font-size="13" fill="white" font-weight="bold">E</text>

  <circle cx="440" cy="160" r="16" fill="#e57373" filter="url(#shadow)"/>
  <text x="440" y="165" text-anchor="middle" font-size="13" fill="white" font-weight="bold">F</text>
  <circle cx="440" cy="310" r="16" fill="#e57373" filter="url(#shadow)"/>
  <text x="440" y="315" text-anchor="middle" font-size="13" fill="white" font-weight="bold">H</text>

  <!-- Articulation point G -->
  <circle cx="510" cy="250" r="20" fill="none" stroke="#e53935" stroke-width="2.5" stroke-dasharray="4 2" filter="url(#glow)"/>
  <circle cx="510" cy="250" r="16" fill="#e53935" filter="url(#shadow)"/>
  <text x="510" y="255" text-anchor="middle" font-size="13" fill="white" font-weight="bold">G</text>

  <!-- Block 3 background -->
  <path d="M 560,120 Q 560,80 610,80 L 710,80 Q 760,80 760,120 L 760,300 Q 760,340 710,340 L 610,340 Q 560,340 560,300 Z" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.6"/>
  <text x="660" y="360" text-anchor="middle" font-size="12" fill="#2e7d32" font-style="italic">Block 3</text>

  <!-- Block 3 edges -->
  <line x1="610" y1="170" x2="710" y2="170" stroke="#66bb6a" stroke-width="2.5"/>
  <line x1="610" y1="170" x2="610" y2="310" stroke="#66bb6a" stroke-width="2.5"/>
  <line x1="710" y1="170" x2="710" y2="310" stroke="#66bb6a" stroke-width="2.5"/>
  <line x1="610" y1="310" x2="710" y2="310" stroke="#66bb6a" stroke-width="2.5"/>
  <line x1="610" y1="170" x2="660" y2="110" stroke="#66bb6a" stroke-width="2.5"/>
  <line x1="710" y1="170" x2="660" y2="110" stroke="#66bb6a" stroke-width="2.5"/>

  <!-- Edge from G to Block 3 -->
  <line x1="526" y1="250" x2="594" y2="170" stroke="#999" stroke-width="2.5" stroke-dasharray="8 4"/>

  <!-- Block 3 vertices -->
  <circle cx="660" cy="110" r="16" fill="#43a047" filter="url(#shadow)"/>
  <text x="660" y="115" text-anchor="middle" font-size="13" fill="white" font-weight="bold">I</text>
  <circle cx="610" cy="170" r="16" fill="#43a047" filter="url(#shadow)"/>
  <text x="610" y="175" text-anchor="middle" font-size="13" fill="white" font-weight="bold">J</text>
  <circle cx="710" cy="170" r="16" fill="#43a047" filter="url(#shadow)"/>
  <text x="710" y="175" text-anchor="middle" font-size="13" fill="white" font-weight="bold">K</text>
  <circle cx="610" cy="310" r="16" fill="#43a047" filter="url(#shadow)"/>
  <text x="610" y="315" text-anchor="middle" font-size="13" fill="white" font-weight="bold">L</text>
  <circle cx="710" cy="310" r="16" fill="#43a047" filter="url(#shadow)"/>
  <text x="710" y="315" text-anchor="middle" font-size="13" fill="white" font-weight="bold">M</text>

  <!-- Legend -->
  <rect x="180" y="410" width="440" height="50" rx="8" fill="#f5f3f0" stroke="#ddd" stroke-width="1"/>
  <circle cx="230" cy="435" r="10" fill="#e53935"/>
  <text x="248" y="440" font-size="12" fill="#555">Articulation point (cut vertex)</text>
  <line x1="430" y1="435" x2="470" y2="435" stroke="#999" stroke-width="2.5" stroke-dasharray="8 4"/>
  <text x="480" y="440" font-size="12" fill="#555">Bridge between blocks</text>
</svg>

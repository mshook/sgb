<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 610" width="700" height="610">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 Z" fill="#555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 Z" fill="#15803d"/>
    </marker>
    <marker id="arr-pink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 Z" fill="#be185d"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 Z" fill="#ea580c"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 Z" fill="#0369a1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="610" fill="white"/>

  <!-- ===== External ROM ===== -->
  <rect x="195" y="18" width="310" height="52" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="350" y="39" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e3a8a">External ROM  (read-only)</text>
  <text x="350" y="57" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3730a3">16-bit words · up to 65,536 locations</text>

  <!-- ===== External: 17 inputs (ROM → processor) ===== -->
  <line x1="268" y1="70" x2="268" y2="120" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="262" y="83" text-anchor="end" font-family="sans-serif" font-size="9" fill="#444">17 inputs:</text>
  <text x="262" y="95" text-anchor="end" font-family="sans-serif" font-size="9" fill="#444">RUN + 16-bit data</text>
  <text x="262" y="107" text-anchor="end" font-family="sans-serif" font-size="9" fill="#888">(little-endian)</text>

  <!-- ===== External: 16 outputs (processor → ROM) ===== -->
  <line x1="455" y1="120" x2="455" y2="70" stroke="#15803d" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <text x="460" y="83" text-anchor="start" font-family="sans-serif" font-size="9" fill="#166534">16 outputs:</text>
  <text x="460" y="95" text-anchor="start" font-family="sans-serif" font-size="9" fill="#166534">memory address</text>
  <text x="460" y="107" text-anchor="start" font-family="sans-serif" font-size="9" fill="#888">(big-endian)</text>

  <!-- ===== Processor chip outline ===== -->
  <rect x="50" y="122" width="600" height="455" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  <text x="350" y="141" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#14532d">RISC Processor  ·  16-bit data path  ·  1,630–3,240 logic gates  (AND / OR / NOT only)</text>

  <!-- ===== Instruction Register ===== -->
  <rect x="80" y="150" width="200" height="48" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="180" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#78350f">Instruction Register</text>
  <text x="180" y="188" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#92400e">16-bit instruction word</text>

  <!-- ===== Status Register ===== -->
  <rect x="428" y="150" width="192" height="80" rx="6" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/>
  <text x="524" y="171" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#831843">Status Register</text>
  <text x="524" y="193" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9d174d">S · N · K · V</text>
  <text x="524" y="212" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9d174d">sign · nonzero · carry · overflow</text>

  <!-- ===== Instruction Decoder ===== -->
  <rect x="80" y="222" width="200" height="58" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="180" y="245" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#4c1d95">Instruction Decoder</text>
  <text x="180" y="265" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b21b6">DST · MOD · OP · A · SRC</text>

  <!-- ===== Register File ===== -->
  <rect x="80" y="310" width="182" height="140" rx="6" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5"/>
  <text x="171" y="331" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0c4a6e">Register File</text>
  <text x="171" y="351" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#075985">r0  =  PC  (program counter)</text>
  <text x="171" y="369" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#075985">r1 – r15  (general purpose)</text>
  <text x="171" y="387" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0284c7">16 bits · 2 to 16 registers</text>
  <text x="171" y="405" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#38bdf8">unused registers read as 0</text>
  <text x="171" y="421" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#38bdf8">writes to absent regs still update status</text>

  <!-- ===== ALU ===== -->
  <rect x="312" y="285" width="206" height="155" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="415" y="308" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#7c2d12">ALU</text>
  <text x="415" y="328" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9a3412">OP=0  General logical  (truth table)</text>
  <text x="415" y="346" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9a3412">OP=1  Arithmetic &amp; shift  ·  JUMP</text>
  <text x="415" y="364" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9a3412">OP=2  Conditional load on S, N</text>
  <text x="415" y="382" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9a3412">OP=3  Conditional load on K, V</text>
  <text x="415" y="402" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c2410c">JUMP writes source → r0 (PC)</text>
  <text x="415" y="420" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c2410c">if DST≠0, saves return addr in DST</text>

  <!-- ===== Memory Address Register ===== -->
  <rect x="178" y="514" width="316" height="46" rx="6" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
  <text x="336" y="534" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#14532d">Memory Address Register</text>
  <text x="336" y="552" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#166534">always holds r0 (PC) · drives next fetch</text>

  <!-- ===== Internal: MAR → output boundary (dashed bus line) ===== -->
  <line x1="455" y1="514" x2="455" y2="124" stroke="#15803d" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- ===== Internal: input → Instruction Register ===== -->
  <path d="M 268 122 L 268 146 L 182 146 L 182 148" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ===== IR → Decoder ===== -->
  <line x1="180" y1="198" x2="180" y2="220" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Decoder → Register File (register select) ===== -->
  <line x1="148" y1="280" x2="148" y2="308" stroke="#0369a1" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="146" y="298" text-anchor="end" font-family="sans-serif" font-size="8.5" fill="#0369a1">select</text>

  <!-- ===== Decoder → ALU (OP / MOD control) ===== -->
  <path d="M 280 256 C 310 256 312 278 312 292" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arr-orange)"/>
  <text x="301" y="264" text-anchor="end" font-family="sans-serif" font-size="8.5" fill="#ea580c">OP / MOD</text>

  <!-- ===== Register File → ALU (source operand) ===== -->
  <line x1="262" y1="358" x2="310" y2="348" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="278" y="347" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#ea580c">src operand</text>

  <!-- ===== ALU → Status (sets S, N, K, V) ===== -->
  <path d="M 511 308 C 546 285 546 238 622 218" stroke="#be185d" stroke-width="1.5" fill="none" marker-end="url(#arr-pink)"/>
  <text x="554" y="258" text-anchor="start" font-family="sans-serif" font-size="8.5" fill="#be185d">S, N, K, V</text>

  <!-- ===== Status → ALU (conditional feedback, dashed) ===== -->
  <path d="M 428 198 C 378 198 368 248 314 300" stroke="#be185d" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arr-pink)"/>
  <text x="368" y="240" text-anchor="end" font-family="sans-serif" font-size="8.5" fill="#be185d">cond.</text>
  <text x="368" y="251" text-anchor="end" font-family="sans-serif" font-size="8.5" fill="#be185d">feedback</text>

  <!-- ===== ALU → Register File (write-back result to DST) ===== -->
  <line x1="312" y1="373" x2="264" y2="373" stroke="#0369a1" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="288" y="368" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#0369a1">write-back</text>

  <!-- ===== Register File r0 → MAR ===== -->
  <path d="M 171 450 L 171 485 L 248 485 L 248 512" stroke="#15803d" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <text x="167" y="474" text-anchor="end" font-family="sans-serif" font-size="8.5" fill="#15803d">r0 (PC)</text>

  <!-- ===== Instruction format legend ===== -->
  <rect x="58" y="473" width="205" height="90" rx="5" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="160" y="490" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#334155">Instruction Format (16 bits)</text>
  <text x="160" y="506" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#475569">15-12   11-8    7-6   5-4   3-0</text>
  <text x="160" y="521" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#475569"> DST    MOD     OP     A    SRC</text>
  <line x1="68" y1="527" x2="255" y2="527" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="160" y="540" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#475569">A=0 immediate  A=1 DST+offset</text>
  <text x="160" y="553" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#475569">A=2 reg[SRC]   A=3 mem[reg[SRC]]</text>
  <text x="160" y="556" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b"></text>

  <!-- ===== Two-word instruction note ===== -->
  <text x="350" y="586" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">★  A=3, SRC=0: uses following memory word as 16-bit immediate; r0 advances by 2</text>
</svg>
